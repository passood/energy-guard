<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnergyGuard | 오프라인</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #ffffff;
        font-family: "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        padding: 24px;
      }

      .card {
        width: min(100%, 420px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        padding: 28px;
        text-align: center;
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(6px);
      }

      .logo {
        margin: 0 0 12px;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      p {
        margin: 12px 0 24px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.85);
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 1rem;
        font-weight: 600;
        color: #0f172a;
        background: #ffffff;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-live="polite">
      <p class="logo">EnergyGuard</p>
      <h1>오프라인 상태입니다</h1>
      <p>인터넷 연결이 복구되면 자동으로 페이지가 로드됩니다.</p>
      <button type="button" onclick="window.location.reload()">다시 시도</button>
    </main>
  </body>
</html>
